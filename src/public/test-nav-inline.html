<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Nav Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Full header.css inline */
        :root { --dark-navy: #0b2a58; --blue-start: #4a90e2; --blue-end: #2962ff; --border-light: #e8edf4; }
        body { margin: 0; font-family: 'Inter', sans-serif; }
        .main-header { position: sticky; top: 0; z-index: 100; padding: 10px 0; background: rgba(11, 42, 88, 0.08); backdrop-filter: blur(10px); }
        .container { width: min(1240px, 92vw); margin: 0 auto; }
        .header-shell { background: #ffffff; border-radius: 14px; box-shadow: 0 8px 26px rgba(7, 30, 67, 0.14); border: 1px solid #e6edf8; display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; }
        .logo { font-size: 38px; font-weight: 800; letter-spacing: -1.2px; color: #0f1116; text-decoration: none; cursor: pointer; }
        .nav-links { display: flex; align-items: center; gap: 34px; }
        .nav-links a, .nav-dropdown-btn { font-size: 14px; font-weight: 700; text-decoration: none; color: #141923; text-transform: uppercase; letter-spacing: 0.25px; background: none; border: 0; cursor: pointer; font-family: 'Inter', sans-serif; }
        .nav-dropdown { position: relative; }
        .dropdown-menu { position: absolute; top: calc(100% + 14px); left: 50%; transform: translateX(-50%) translateY(-8px); list-style: none; min-width: 190px; padding: 8px; border-radius: 12px; border: 1px solid var(--border-light); background: #fff; box-shadow: 0 18px 36px rgba(12, 29, 56, 0.16); opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease; z-index: 200; }
        .nav-dropdown:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .dropdown-menu a { display: block; padding: 10px 12px; border-radius: 8px; text-transform: none; font-size: 14px; color: #1d2738; text-decoration: none; }
        .dropdown-menu a:hover { background: #eef5ff; color: var(--blue-end); }
        .btn-primary { border: 0; text-decoration: none; color: #fff; background: linear-gradient(135deg, var(--blue-start), var(--blue-end)); border-radius: 999px; font-size: 15px; font-weight: 700; letter-spacing: 0.2px; padding: 12px 26px; box-shadow: 0 8px 22px rgba(41, 98, 255, 0.4); transition: transform 0.2s ease, box-shadow 0.2s ease; display: inline-block; font-family: 'Inter', sans-serif; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(41, 98, 255, 0.48); }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container header-shell">
            <a href="#" class="logo">TEST INLINE</a>
            <nav class="nav-links">
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">Solutions ▼</button>
                    <ul class="dropdown-menu">
                        <li><a href="#">Link 1</a></li>
                        <li><a href="#">Link 2</a></li>
                    </ul>
                </div>
                <a href="#">Link</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">About ▼</button>
                    <ul class="dropdown-menu">
                        <li><a href="#">About</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </div>
            </nav>
            <a href="#" class="btn-primary">Button</a>
        </div>
    </header>
    <div style="padding: 50px; text-align: center;">
        <h1>Inline Nav Test (No external JS/CSS)</h1>
        <p>Hover dropdowns. Pure CSS hover + inline JS debug. Console logs execution.</p>
    </div>
    <script>
        console.log('Inline test start');
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM ready');
            const dropdowns = document.querySelectorAll('.nav-dropdown');
            console.log('Found dropdowns:', dropdowns.length);
            dropdowns.forEach((dropdown, i) => {
                const menu = dropdown.querySelector('.dropdown-menu');
                console.log(`Dropdown ${i} menu:`, menu);
                if (!menu) return;
                menu.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                menu.style.opacity = '0';
                menu.style.visibility = 'hidden';
                let timeout;
                dropdown.addEventListener('mouseenter', () => {
                    console.log(`Hover in ${i}`);
                    clearTimeout(timeout);
                    menu.style.opacity = '1';
                    menu.style.visibility = 'visible';
                });
                dropdown.addEventListener('mouseleave', () => {
                    console.log(`Hover out ${i}`);
                    timeout = setTimeout(() => {
                        menu.style.opacity = '0';
                        menu.style.visibility = 'hidden';
                    }, 200);
                });
            });
        });
    </script>
</body>
</html>
